# Log Monitor Configuration for munin-plugin-pack
# Format: logfile|pattern
# Each line defines a log file and a pattern to monitor.
# The plugin creates one metric per line, counting pattern matches
# in the last 1000 lines (configurable via log_monitor_window).
#
# Uncomment and adjust the following entries as needed:

# SSH authentication failures
# /var/log/auth.log|Failed password

# SSH invalid user attempts
# /var/log/auth.log|Invalid user

# Nginx 500 errors
# /var/log/nginx/error.log|500

# Nginx 502 bad gateway
# /var/log/nginx/error.log|502

# Application panic
# /var/log/app/app.log|panic

# Out of memory
# /var/log/syslog|Out of memory

# Connection refused
# /var/log/app/app.log|connection refused

# Permission denied
# /var/log/auth.log|permission denied

# Cron errors
# /var/log/syslog|cron.*error

# Kernel errors
# /var/log/kern.log|error
